name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── lint + unit tests: every push and pull request ────────────────────────
  test:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  # ── release binaries: only on version tags (v*) ───────────────────────────
  build:
    name: build ${{ matrix.name }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            ext: ''
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ''
          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            ext: ''
          - name: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            ext: '.exe'
          - name: windows-aarch64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --workspace --target ${{ matrix.target }}
      - name: stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/rs_srpd${{ matrix.ext }}" dist/
          cp "target/${{ matrix.target }}/release/rs_srpc${{ matrix.ext }}" dist/
      - uses: actions/upload-artifact@v4
        with:
          name: rs_srp-${{ matrix.name }}
          path: dist/

  # ── publish a GitHub Release: only on version tags (v*) ───────────────────
  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: package per-platform archives
        run: |
          cd artifacts
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -r "../${name}.zip" .)
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
