# srpc.example.toml — example client configuration for rs_srpc
#
# This file is generated by `rs_srpd client-config` and consumed by
# `rs_srpc run -c srpc.toml`. Copy this file to srpc.toml and fill in the
# values printed by the server.

[client]
# Hostname (or IP) of the rs_srpd server.
server_host = "srp.example.com"

# Ordered list of transports to attempt. The first one that connects wins.
# Valid values: "quic", "wss", "tcp"
transport_priority = ["quic", "wss", "tcp"]

# Base-64-encoded 32-byte Noise static public key of the server (for pinning).
server_noise_pubkey = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

# SHA-256 fingerprint of the server's TLS certificate (for pinning).
server_cert_fingerprint = "sha256:0011223344556677889900aabbccddeeff0011223344556677889900aabbccdd"

[client.transports.quic]
port = 7101

[client.transports.wss]
port = 7102
path = "/srp-tunnel"

[client.transports.tcp]
port = 7100

[security]
# Pre-shared service secret configured on the server.
server_secret = "change-me-service-psk"
# Your username as registered on the server.
username = "alice"
# Your per-user authentication token.
token = "alice-secret-token"

# ── Proxy rules ───────────────────────────────────────────────────────────────
# Each [[proxies]] entry forwards one port exposed by the server to a local
# address on the machine running rs_srpc.

[[proxies]]
name       = "ssh"
type       = "tcp"
local_addr = "127.0.0.1:22"
remote_port = 20022

[[proxies]]
name       = "web"
type       = "tcp"
local_addr = "127.0.0.1:8080"
remote_port = 20080
